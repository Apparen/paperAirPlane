<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Airplane</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game">
      <div id="start">Start Game</div>
      <div id="plane"></div>
      <div id="score-display">Score: 0</div>
    </div>
  </body>
  <script>
    console.log("Game starting...");
    let plane = document.getElementById("plane");
    let game = document.getElementById("game");
    let start = document.getElementById("start");
    plane.style.display = "none";
    let planeY = 180;
    let velocity = 0;
    let gravity = 0.5;
    let jumpStrength = -7;
    let gameInterval;
    let frameCount = 0;
    let spawnRate = 100;
    let score = 0;
    let pipes = [];
    plane.style.top = planeY + "px";
    document.getElementById("start").addEventListener("click", function () {
      gameStart();
    });
    function gameStart() {
      start.style.display = "none";
      plane.style.display = "block";
      gameInterval = setInterval(fall, 24);
    }
    function fall() {
      velocity += gravity;
      planeY += velocity;
      plane.style.top = planeY + "px";
      movePipes();
      frameCount++;
      if (frameCount % spawnRate == 0) {
        createPipe();
      }

      if (checkCollision()) {
        gameOver();
        return;
      }
      const isOutOfBound = planeY > game.clientHeight || planeY < 0;
      if (isOutOfBound) {
        gameOver();
      }
    }
    function gameOver() {
      clearInterval(gameInterval);
      start.style.display = "block";
      start.style.backgroundColor = "red";
      start.textContent = "Game Over!";
      planeY = 180;
      plane.style.top = planeY + "px";
      game.querySelectorAll(".pipe").forEach((pipe) => pipe.remove());
      score = 0;
      document.getElementById("score-display").textContent = "Score: " + score;
    }

    function createPipe() {
      let gapY = Math.random() * 300 + 100;
      let pipeX = game.clientWidth;
      let gapSize = 150;
      let pipeTop = document.createElement("div");
      let pipeBottom = document.createElement("div");

      pipeTop.classList.add("pipe", "pipe-top");
      pipeTop.style.top = 0;
      pipeTop.style.height = gapY + "px";
      pipeTop.style.left = pipeX + "px";

      pipeBottom.classList.add("pipe", "pipe-bottom");
      pipeBottom.style.bottom = 0;
      pipeBottom.style.height = `${game.clientHeight - gapY - gapSize}px`;
      pipeBottom.style.left = pipeX + "px";

      console.log(pipeBottom.style.height + "px");
      console.log(pipeTop.style.height + "px");

      let pipePair = {
        top: pipeTop,
        bottom: pipeBottom,
        x: pipeX,
        passed: false,
      };
      // console.log("Pipa dibuat di X:", pipeX);
      // console.log(
      //   "Jumlah pipa di layar:",
      //   document.querySelectorAll(".pipe").length,
      // );s
      pipes.push(pipePair);
      // console.log(pipePair);
      game.appendChild(pipeTop);
      game.appendChild(pipeBottom);
    }

    function movePipes() {
      for (let i = pipes.length - 1; i >= 0; i--) {
        let pipe = pipes[i];
        pipe.x -= 2;

        pipe.top.style.left = pipe.x + "px";
        pipe.bottom.style.left = pipe.x + "px";

        if (!pipe.passed && pipe.x + 60 < plane.offsetLeft) {
          score++;
          pipe.passed = true;
          document.getElementById("score-display").textContent =
            "Score: " + score;
          console.log("Score:", score);
        }
        if (pipe.x + 60 < 0) {
          pipe.top.remove();
          pipe.bottom.remove();
          pipes.splice(i, 1);
        }
      }
    }

    function checkCollision() {
      let planeRect = plane.getBoundingClientRect();
      let gameRect = game.getBoundingClientRect();

      for (let pipe of pipes) {
        let topRect = pipe.top.getBoundingClientRect();
        let bottomRect = pipe.bottom.getBoundingClientRect();

        if (
          rectOverlap(planeRect, topRect) ||
          rectOverlap(planeRect, bottomRect)
        ) {
          return true;
        }
      }
      return false;
    }

    function rectOverlap(rect1, rect2) {
      return !(
        rect2.left > rect1.right ||
        rect2.right < rect1.left ||
        rect2.top > rect1.bottom ||
        rect2.bottom < rect1.top
      );
    }
    game.addEventListener("click", function () {
      velocity = jumpStrength;
    });
  </script>
</html>
